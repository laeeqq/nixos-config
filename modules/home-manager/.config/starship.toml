# Docker & Conda
[docker_context]
symbol = "🛳"
style = "bg:color_darkgray"
format = '[[ $symbol( $context )](if_exists:fg:color_blue else:fg:color_red bg:color_darkgray)]($style)'

[conda]
style = "bg:color_darkgray"
format = '[[ $symbol( $environment )](if_exists:fg:color_blue else:fg:color_red bg:color_darkgray)]($style)'

# Time
[time]
disabled = false
time_format = "%R"
style = "bg:color_black"
format = '[[ ⏱ $time ](fg:color_fg0 bg:color_black)]($style)'
