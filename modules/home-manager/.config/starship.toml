"$schema" = 'https://starship.rs/config-schema.json'

format = """
[🏎](color_red) \
$os\
$username\
[](bg:color_darkgray fg:color_red)\
$directory\
[](fg:color_darkgray bg:color_blue)\
$git_branch\
$git_status\
[](fg:color_blue bg:color_black)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_black bg:color_darkgray)\
$docker_context\
$conda\
$pixi\
[](fg:color_darkgray bg:color_black)\
$time\
[ ](fg:color_black)\
$line_break$character
"""

palette = 'f1_dashboard'

[palettes.f1_dashboard]
color_fg0 = '#ffffff'       # Default text
color_black = '#121212'     # Base background
color_darkgray = '#1e1e1e'  # Panels background
color_red = '#ff1a1a'       # Missing/error
color_green = '#00ff55'     # Available/installed
color_blue = '#00aaff'      # Git/info
color_orange = '#ff6600'    # Languages/commands

# OS icon
[os]
disabled = false
style = "bg:color_red fg:color_fg0"

[os.symbols]
Windows = "🖥"
Linux = "💻"
Macos = "🍏"
Ubuntu = "🟠"
Arch = "⛤"
Fedora = "🌀"

# Username block
[username]
show_always = true
style_user = "bg:color_red fg:color_fg0"
style_root = "bg:color_red fg:color_fg0"
format = '[ $user ]($style)'

# Directory block
[directory]
style = "fg:color_fg0 bg:color_darkgray"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = "bold fg:color_red"

# Git branch & status
[git_branch]
symbol = "🏁"
style = "bg:color_blue"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_blue)]($style)'
disabled = false

[git_status]
style = "bg:color_blue"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_blue)]($style)'
disabled = false

# Programming languages with dynamic color
[nodejs]
symbol = "⚡"
style = "bg:color_black"
format = '[[ $symbol( $version )](if_exists:fg:color_green else:fg:color_red bg:color_black)]($style)'

[c]
symbol = "⚡"
style = "bg:color_black"
format = '[[ $symbol( $version )](if_exists:fg:color_green else:fg:color_red bg:color_black)]($style)'

[cpp]
symbol = "⚡"
style = "bg:color_black"
format = '[[ $symbol( $version )](if_exists:fg:color_green else:fg:color_red bg:color_black)]($style)'

